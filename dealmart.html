<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 0秒无感跳转核心代码 -->
    <meta http-equiv="refresh" content="0; URL='https://www.codester.com/items/61485/dealmart-ultimate-php-affiliate-deals-coupons?ref=fire1314'">
    <title>Redirecting...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 2.5rem;
            max-width: 420px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3), 0 8px 10px -6px rgb(0 0 0 / 0.3);
        }
        .spinner {
            position: relative;
            width: 56px;
            height: 56px;
            margin: 0 auto 1.5rem auto;
        }
        .spinner-ring {
            box-sizing: border-box;
            display: block;
            position: absolute;
            width: 56px;
            height: 56px;
            border: 5px solid rgba(59, 130, 246, 0.1);
            border-radius: 50%;
        }
        .spinner-ring-active {
            box-sizing: border-box;
            display: block;
            position: absolute;
            width: 56px;
            height: 56px;
            border: 5px solid transparent;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }
        .title {
            font-size: 1.35rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #f1f5f9;
            letter-spacing: -0.025em;
        }
        .subtitle {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-bottom: 1.5rem;
        }
        .fallback-link {
            display: inline-block;
            font-size: 0.85rem;
            color: #3b82f6;
            text-decoration: none;
            transition: color 0.15s;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            background: rgba(59, 130, 246, 0.08);
        }
        .fallback-link:hover {
            color: #60a5fa;
            background: rgba(59, 130, 246, 0.15);
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner">
            <div class="spinner-ring"></div>
            <div class="spinner-ring-active"></div>
        </div>
        <div class="title">Loading secure offer...</div>
        <div class="subtitle">Please wait while we redirect you to the promotion.</div>
        <a class="fallback-link" href="https://www.codester.com/items/61485/dealmart-ultimate-php-affiliate-deals-coupons?ref=fire1314">Click here if you are not redirected</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { initializeFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD8xUKkp_UxO5t0zdyRKy3VVgrrp03PfFk",
            authDomain: "gen-lang-client-0746300490.firebaseapp.com",
            projectId: "gen-lang-client-0746300490",
            storageBucket: "gen-lang-client-0746300490.firebasestorage.app",
            messagingSenderId: "244023005275",
            appId: "1:244023005275:web:aa3b13577b3368816eef7e"
        };

        // Function to perform the redirect
        function doRedirect() {
            window.location.replace('https://www.codester.com/items/61485/dealmart-ultimate-php-affiliate-deals-coupons?ref=fire1314');
        }

        // Set safety timeout (1.5s)
        const safetyTimeout = setTimeout(doRedirect, 1500);

        try {
            // Initialize Firebase
            const app = initializeApp(firebaseConfig);
            const db = initializeFirestore(app, {
                databaseId: "ai-studio-30b08fd7-107a-4584-b5e2-c6a1646499f9"
            });

            // Gather tracking data
            const userAgent = navigator.userAgent;
            const referrer = document.referrer || "Direct";
            
            let deviceType = "Desktop";
            if (/Mobi|Android|iPhone|iPad|iPod/i.test(userAgent)) {
                deviceType = "Mobile";
            } else if (/Tablet|iPad/i.test(userAgent)) {
                deviceType = "Tablet";
            }

            // Fetch IP location data
            const ipResponse = await fetch('https://ipapi.co/json/')
                .then(res => res.json())
                .catch(() => ({}));

            const trackingData = {
                shortCode: "dealmart",
                userAgent: userAgent,
                referrer: referrer,
                deviceType: deviceType,
                ip: ipResponse.ip || "Unknown",
                city: ipResponse.city || "Unknown",
                region: ipResponse.region || "Unknown",
                country: ipResponse.country_name || "Unknown",
                timestamp: serverTimestamp()
            };

            // Save to Firestore
            await addDoc(collection(db, "clicks"), trackingData);
        } catch (e) {
            console.error("Tracking error:", e);
        } finally {
            clearTimeout(safetyTimeout);
            doRedirect();
        }
    </script>
</body>
</html>
